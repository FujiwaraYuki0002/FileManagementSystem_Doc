        <div class="center">

                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="content_right center">
                    <div class="Form_layout">
                        <label>役職名</label>
                        <input type="text" style="font-size: 20px;" placeholder="1文字～20文字で入力してください" class="textbox"
                            size="30" id="input1" autocomplete="off">
                    </div>
                </div>

    <!--フッター-->
    <footer>
        <div class="left">
            <input type="button" value="戻る" class="button" onclick=history.back()>
        </div>
        <div class="right">
            <form class="display-inline" action="index.html" method="post" onsubmit="return insertcheck()">
                <input type="submit" value="登録" name="button1" class="button" id="submit1" disabled>
            </form>
        </div>
    </footer>

    <!-- エラーダイアログ -->
    <div id="errorAlert">
        <!--			<div class="errorMessage"></div>-->
        <button id="okButton" onclick="closeAlert()">OK</button>
    </div>
</body>
<script>
    //登録ボタン活性・非活性
    $(function () {
        $("#input1").on("keydown keyup keypress change", function () {
            inputCheck(this)
        });
    });

    // 初期表示の処理
    window.onload = function () {
        // エラーがあるかどうか
        if (document.getElementsByClassName('errorMessage').length > 0) {
            errorAlert();
        }
    };
</script>
